<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#111;color:#e5e5e5;overflow:hidden}

/* Upload */
.upload{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;background:#111}
.upload-title{font-size:24px;font-weight:600;display:flex;align-items:center;gap:10px}
.upload-title svg{color:#3b82f6}
.upload-box{background:#1a1a1a;border:2px dashed #333;border-radius:12px;padding:48px 40px;text-align:center;cursor:pointer;max-width:480px;width:100%;transition:all .2s}
.upload-box:hover{border-color:#3b82f6;background:#1f1f1f}
.upload-box h2{font-size:18px;margin:16px 0 8px}
.upload-box p{color:#666;font-size:14px;margin-bottom:20px}
.upload-btn{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer}
.upload-btn:hover{background:#2563eb}
input[type="file"]{display:none}

/* App */
.app{display:none;height:100vh;flex-direction:column}
.app.show{display:flex}

/* Toolbar */
.toolbar{background:#1a1a1a;border-bottom:1px solid #262626;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar-brand{font-weight:600;color:#3b82f6;font-size:15px;display:flex;align-items:center;gap:6px}
.toolbar-brand svg{width:20px;height:20px}
.toolbar-sep{width:1px;height:20px;background:#333}
.toolbar-file{font-size:12px;color:#666;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toolbar-edits{background:#f59e0b22;color:#f59e0b;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;display:none}
.toolbar-edits.show{display:block}
.btn{background:#262626;border:1px solid #333;color:#999;border-radius:6px;padding:7px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{background:#333;color:#fff;border-color:#444}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn svg{width:14px;height:14px}
.btn.save{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.save:hover{background:#2563eb}
.toolbar-gap{flex:1}
.zoom-ctrl{display:flex;align-items:center;gap:4px}
.zoom-val{font-size:11px;color:#666;min-width:40px;text-align:center}

/* Viewer */
.viewer{flex:1;overflow:auto;background:#0a0a0a;padding:24px}
.pages{display:flex;flex-direction:column;align-items:center;gap:24px}
.page-wrap{position:relative;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5);border-radius:2px}
.page-wrap canvas{display:block}
.overlay-cv{position:absolute;top:0;left:0;pointer-events:none}
.blocks-lyr{position:absolute;top:0;left:0}
.page-lbl{text-align:center;font-size:11px;color:#444;padding:10px 0}

/* Text blocks */
.txt-blk{position:absolute;cursor:pointer;border-radius:2px;transition:all .1s}
.txt-blk:hover{background:rgba(59,130,246,.06);outline:1px dashed rgba(59,130,246,.4)}
.txt-blk.edited{outline:1px solid #f59e0b;background:rgba(245,158,11,.05)}
.txt-blk.active{outline:2px solid #3b82f6!important;background:rgba(59,130,246,.1)!important;z-index:50}

/* Inline editor */
.txt-edit{position:absolute;z-index:100;display:none;border:2px solid #3b82f6;border-radius:4px;padding:6px 8px;outline:none;resize:none;overflow:hidden;line-height:1.4;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,.6)}

/* Toast */
.toasts{position:fixed;bottom:20px;right:20px;z-index:9999}
.toast{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 16px;font-size:12px;margin-top:8px;animation:fadeIn .2s}
.toast.ok{border-color:#22c55e;color:#22c55e}
.toast.warn{border-color:#f59e0b;color:#f59e0b}
.toast.err{border-color:#ef4444;color:#ef4444}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Loader */
.loader{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loader.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:13px;color:#666}

/* Hint */
.hint{position:fixed;bottom:16px;left:16px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 12px;font-size:11px;color:#666;display:none;z-index:200}
.hint.show{display:block}
.hint kbd{background:#262626;border:1px solid #333;border-radius:3px;padding:1px 5px;color:#999;margin:0 2px}

@media(max-width:600px){.toolbar-sep,.toolbar-file{display:none}.btn span{display:none}.btn{padding:8px}}
</style>
</head>
<body>

<div class="upload" id="upload">
  <div class="upload-title">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
    PDF Editor
  </div>
  <div class="upload-box" id="dropzone">
    <div style="font-size:40px">📄</div>
    <h2>Drop PDF here</h2>
    <p>Click any text to edit • Enter for new line • Esc to finish</p>
    <button class="upload-btn" onclick="document.getElementById('filein').click()">Choose File</button>
  </div>
  <input type="file" id="filein" accept=".pdf">
</div>

<div class="app" id="app">
  <div class="toolbar">
    <div class="toolbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      PDF Editor
    </div>
    <div class="toolbar-sep"></div>
    <span class="toolbar-file" id="filename">—</span>
    <span class="toolbar-edits" id="editcount">0</span>
    <div class="toolbar-sep"></div>
    <button class="btn" id="undo" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 5 5v2M3 10l5-5M3 10l5 5"/></svg></button>
    <button class="btn" id="redo" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 0 0-5 5v2M21 10l-5-5M21 10l-5 5"/></svg></button>
    <div class="toolbar-sep"></div>
    <div class="zoom-ctrl">
      <button class="btn" id="zout">−</button>
      <span class="zoom-val" id="zval">100%</span>
      <button class="btn" id="zin">+</button>
    </div>
    <div class="toolbar-gap"></div>
    <button class="btn" id="reset"><span>Reset</span></button>
    <button class="btn" id="open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg><span>Open</span></button>
    <button class="btn save" id="save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg><span>Save</span></button>
  </div>
  <div class="viewer" id="viewer">
    <div class="pages" id="pages"></div>
  </div>
  <div class="hint" id="hint"><kbd>Enter</kbd> new line • <kbd>Esc</kbd> finish • <kbd>Ctrl+S</kbd> save</div>
</div>

<div class="toasts" id="toasts"></div>
<div class="loader" id="loader"><div class="spinner"></div><div class="loader-txt" id="loadertxt">Loading...</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const $=id=>document.getElementById(id);
const D={name:'',bytes:null,pdf:null,zoom:1,pages:{},edits:{},curr:null,undo:[],redo:[]};

const toast=(m,t='')=>{const e=document.createElement('div');e.className='toast '+t;e.textContent=m;$('toasts').appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),200)},2000)};
const load=(s,m='Loading...')=>{$('loader').classList.toggle('show',s);$('loadertxt').textContent=m};

// ─────────────────────────────────────────────
// Color detection
// ─────────────────────────────────────────────
function getBg(ctx,x,y,w,h,W,H){
  const pts=[[x-35,y+h/2],[x+w+35,y+h/2],[x-25,y+h*.3],[x-25,y+h*.7],[x+w/2,y-20],[x+w/2,y+h+20]];
  const cs=[];
  for(const[px,py] of pts){
    const sx=Math.max(0,Math.min(Math.round(px),W-1)),sy=Math.max(0,Math.min(Math.round(py),H-1));
    try{const d=ctx.getImageData(sx,sy,1,1).data;cs.push([d[0],d[1],d[2]])}catch(e){}
  }
  if(!cs.length)return{r:255,g:255,b:255};
  const sums=cs.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],[0,0,0]);
  return{r:Math.round(sums[0]/cs.length),g:Math.round(sums[1]/cs.length),b:Math.round(sums[2]/cs.length)};
}

function getTxt(ctx,x,y,w,h,bg,W,H){
  const pts=[];
  for(let dx=.15;dx<=.85;dx+=.1)for(let dy=.25;dy<=.75;dy+=.15)pts.push([x+w*dx,y+h*dy]);
  let best=null,maxD=0;
  for(const[px,py] of pts){
    const sx=Math.max(0,Math.min(Math.round(px),W-1)),sy=Math.max(0,Math.min(Math.round(py),H-1));
    try{
      const d=ctx.getImageData(sx,sy,1,1).data;
      const diff=Math.abs(d[0]-bg.r)+Math.abs(d[1]-bg.g)+Math.abs(d[2]-bg.b);
      if(diff>maxD){maxD=diff;best=[d[0],d[1],d[2]]}
    }catch(e){}
  }
  if(!best||maxD<50){const L=.299*bg.r+.587*bg.g+.114*bg.b;return L<128?{r:255,g:255,b:255}:{r:0,g:0,b:0}}
  return{r:best[0],g:best[1],b:best[2]};
}

// ─────────────────────────────────────────────
// File handling
// ─────────────────────────────────────────────
async function openPDF(f){
  if(!f||!f.name.toLowerCase().endsWith('.pdf'))return;
  load(true,'Opening...');
  try{
    D.name=f.name;D.bytes=new Uint8Array(await f.arrayBuffer());
    D.pdf=await pdfjsLib.getDocument({data:D.bytes.slice()}).promise;
    D.pages={};D.edits={};D.curr=null;D.undo=[];D.redo=[];
    await render();
    $('upload').style.display='none';$('app').classList.add('show');
    $('filename').textContent=D.name;updUI();
    toast('Opened','ok');
  }catch(e){console.error(e);toast('Error','err')}
  load(false);
}

async function render(){
  const c=$('pages');c.innerHTML='';
  for(let p=1;p<=D.pdf.numPages;p++){
    const pg=await D.pdf.getPage(p);
    const vp=pg.getViewport({scale:D.zoom});
    const W=Math.round(vp.width),H=Math.round(vp.height);
    const wrap=document.createElement('div');wrap.className='page-wrap';wrap.dataset.p=p;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const ov=document.createElement('canvas');ov.className='overlay-cv';ov.width=W;ov.height=H;
    const bl=document.createElement('div');bl.className='blocks-lyr';bl.style.cssText=`width:${W}px;height:${H}px`;
    const lb=document.createElement('div');lb.className='page-lbl';lb.textContent=`Page ${p} of ${D.pdf.numPages}`;
    wrap.append(cv,ov,bl,lb);c.appendChild(wrap);
    D.pages[p]={pg,vp,cv,ov,bl,blocks:[],W,H};
    await renderPage(p);
  }
}

async function renderPage(p){
  const pd=D.pages[p];
  await pd.pg.render({canvasContext:pd.cv.getContext('2d'),viewport:pd.vp}).promise;
  const tc=await pd.pg.getTextContent({includeMarkedContent:false});
  pd.blocks=extract(tc,pd.vp,pd.cv);
  buildBlocks(p);
  reapply(p);
}

// ─────────────────────────────────────────────
// Extract text
// ─────────────────────────────────────────────
function extract(tc,vp,cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const items=tc.items.filter(i=>i.str&&i.str.trim());
  if(!items.length)return[];
  const mapped=items.map(i=>{
    const tx=pdfjsLib.Util.transform(vp.transform,i.transform);
    const fh=Math.sqrt(tx[2]**2+tx[3]**2);
    return{text:i.str,x:tx[4],y:tx[5]-fh,w:i.width>0?i.width*vp.scale:i.str.length*fh*.5,h:fh,bl:tx[5],
      px:i.transform[4],py:i.transform[5],pfs:Math.sqrt(i.transform[0]**2+i.transform[1]**2),pw:i.width||0};
  });
  mapped.sort((a,b)=>{const d=a.bl-b.bl;return Math.abs(d)>5?d:a.x-b.x});
  const lines=[];
  for(const i of mapped){
    const L=lines[lines.length-1];
    if(L&&Math.abs(i.bl-L.bl)<5&&i.x-L.x2<i.h*3){L.items.push(i);L.x2=Math.max(L.x2,i.x+i.w)}
    else lines.push({items:[i],bl:i.bl,x1:i.x,x2:i.x+i.w,y:i.y,h:i.h});
  }
  return lines.map((L,idx)=>{
    L.items.sort((a,b)=>a.x-b.x);
    const x=Math.min(...L.items.map(i=>i.x)),y=Math.min(...L.items.map(i=>i.y));
    const x2=Math.max(...L.items.map(i=>i.x+i.w)),y2=Math.max(...L.items.map(i=>i.y+i.h));
    const fh=Math.max(...L.items.map(i=>i.h));
    const txt=L.items.map(i=>i.text).join(' ');
    const bg=getBg(ctx,x,y,x2-x,y2-y,W,H);
    const tc=getTxt(ctx,x,y,x2-x,y2-y,bg,W,H);
    return{id:'B'+idx,text:txt,x,y,w:x2-x,h:y2-y,fh,bg,tc,items:L.items};
  });
}

function buildBlocks(p){
  const pd=D.pages[p];pd.bl.innerHTML='';
  for(const b of pd.blocks){
    const d=document.createElement('div');d.className='txt-blk';
    d.style.cssText=`left:${b.x-3}px;top:${b.y-3}px;width:${b.w+6}px;height:${b.h+6}px`;
    d.dataset.id=b.id;d.onclick=e=>{e.stopPropagation();startEdit(p,b,d)};
    pd.bl.appendChild(d);
  }
}

// ─────────────────────────────────────────────
// Editing
// ─────────────────────────────────────────────
function startEdit(p,b,div){
  commit();
  const pd=D.pages[p];
  let ed=pd.bl.querySelector(`.txt-edit[data-id="${b.id}"]`);
  if(!ed){ed=document.createElement('textarea');ed.className='txt-edit';ed.dataset.id=b.id;ed.dataset.p=p;ed.spellcheck=false;pd.bl.appendChild(ed)}
  const key=`${p}_${b.id}`,cur=D.edits[key]?.nw??b.text;
  const fs=Math.max(Math.round(b.fh*.8),10);
  ed.value=cur;
  ed.style.cssText=`left:${b.x-5}px;top:${b.y-5}px;width:${Math.max(b.w+100,200)}px;min-height:${b.h+14}px;font-size:${fs}px;font-weight:${b.fh>14?'bold':'normal'};color:rgb(${b.tc.r},${b.tc.g},${b.tc.b});background:rgb(${b.bg.r},${b.bg.g},${b.bg.b});display:block`;
  div.classList.add('active');D.curr={p,b,div,ed};
  const resize=()=>{ed.style.height='auto';ed.style.height=Math.max(ed.scrollHeight,b.h+14)+'px'};
  ed.focus();ed.select();resize();ed.oninput=resize;
  ed.onfocus=()=>$('hint').classList.add('show');
  ed.onblur=()=>{$('hint').classList.remove('show');setTimeout(commit,50)};
  ed.onkeydown=e=>{if(e.key==='Escape'){e.preventDefault();ed.blur()}if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();ed.blur()}};
}

function commit(){
  if(!D.curr)return;
  const{p,b,div,ed}=D.curr;
  const nw=ed.value,key=`${p}_${b.id}`,old=D.edits[key]?.nw??b.text;
  ed.style.display='none';div.classList.remove('active');$('hint').classList.remove('show');
  if(nw!==b.text){
    if(nw!==old){D.undo.push({key,old,nw,p,b});D.redo=[]}
    D.edits[key]={p,b,nw};div.classList.add('edited');preview(p,b,nw);
  }else{delete D.edits[key];div.classList.remove('edited');clearPv(p,b)}
  D.curr=null;updUI();
}

// ─────────────────────────────────────────────
// Preview
// ─────────────────────────────────────────────
function preview(p,b,nw){
  const pd=D.pages[p],ctx=pd.ov.getContext('2d');
  const lines=nw.split('\n'),lh=b.fh*1.35,th=Math.max(b.h,lines.length*lh)+40;
  ctx.clearRect(0,b.y-20,pd.W,th+40);
  if(!nw)return;
  ctx.fillStyle=`rgb(${b.bg.r},${b.bg.g},${b.bg.b})`;
  ctx.fillRect(0,b.y-12,pd.W,th+24);
  ctx.fillRect(b.x-25,b.y-10,b.w+150,th+20);
  ctx.fillStyle=`rgb(${b.tc.r},${b.tc.g},${b.tc.b})`;
  const fs=Math.max(Math.round(b.fh*.8),10);
  ctx.font=`${b.fh>14?'bold ':''}${fs}px sans-serif`;ctx.textBaseline='top';
  let y=b.y+3;for(const l of lines){ctx.fillText(l,b.x,y);y+=lh}
}

function clearPv(p,b){D.pages[p].ov.getContext('2d').clearRect(0,b.y-30,D.pages[p].W,b.h+150)}
function reapply(p){for(const k in D.edits)if(D.edits[k].p===p){preview(p,D.edits[k].b,D.edits[k].nw);D.pages[p].bl.querySelector(`[data-id="${D.edits[k].b.id}"]`)?.classList.add('edited')}}

// ─────────────────────────────────────────────
// Undo/Redo
// ─────────────────────────────────────────────
function undo(){if(!D.undo.length)return;commit();const a=D.undo.pop();D.redo.push({...a,old:a.nw,nw:a.old});if(a.old===a.b.text){delete D.edits[a.key];clearPv(a.p,a.b);D.pages[a.p]?.bl.querySelector(`[data-id="${a.b.id}"]`)?.classList.remove('edited')}else{D.edits[a.key]={p:a.p,b:a.b,nw:a.old};preview(a.p,a.b,a.old)}updUI();toast('Undo')}
function redo(){if(!D.redo.length)return;commit();const a=D.redo.pop();D.undo.push({...a,old:a.nw,nw:a.old});D.edits[a.key]={p:a.p,b:a.b,nw:a.old};preview(a.p,a.b,a.old);D.pages[a.p]?.bl.querySelector(`[data-id="${a.b.id}"]`)?.classList.add('edited');updUI();toast('Redo')}
function updUI(){$('undo').disabled=!D.undo.length;$('redo').disabled=!D.redo.length;const n=Object.keys(D.edits).length;$('editcount').textContent=n+' edit'+(n!==1?'s':'');$('editcount').classList.toggle('show',n>0)}

// ─────────────────────────────────────────────
// Save
// ─────────────────────────────────────────────
async function savePDF(){
  const eds=Object.values(D.edits);
  if(!eds.length){toast('No edits','warn');return}
  load(true,'Saving...');
  try{
    const{PDFDocument,StandardFonts,rgb}=PDFLib;
    const doc=await PDFDocument.load(D.bytes.buffer);
    const fnt=await doc.embedFont(StandardFonts.Helvetica);
    const fntB=await doc.embedFont(StandardFonts.HelveticaBold);
    const pgs=doc.getPages();
    for(const e of eds){
      const pi=e.p-1;if(pi<0||pi>=pgs.length)continue;
      const pg=pgs[pi],pw=pg.getWidth(),b=e.b,its=b.items;
      const pxMin=Math.min(...its.map(i=>i.px)),pxMax=Math.max(...its.map(i=>i.px+(i.pw||i.pfs*i.text.length*.6)));
      const pyMin=Math.min(...its.map(i=>i.py)),pyMax=Math.max(...its.map(i=>i.py)),pfs=its[0].pfs||12;
      const bgC=rgb(b.bg.r/255,b.bg.g/255,b.bg.b/255),txC=rgb(b.tc.r/255,b.tc.g/255,b.tc.b/255);
      const lines=e.nw.split('\n'),lh=pfs*1.35,th=(pyMax-pyMin)+pfs*3+(lines.length-1)*lh;
      pg.drawRectangle({x:0,y:pyMin-pfs*1.5,width:pw,height:th,color:bgC});
      pg.drawRectangle({x:pxMin-40,y:pyMin-pfs*1.2,width:(pxMax-pxMin)+180,height:th,color:bgC});
      const f=pfs>11?fntB:fnt;let yp=pyMax;
      for(const l of lines){if(l.trim())pg.drawText(l,{x:pxMin,y:yp,size:pfs,font:f,color:txC});yp-=lh}
    }
    const out=await doc.save();
    const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
    const a=document.createElement('a');a.href=url;a.download=D.name.replace(/\.pdf$/i,'_edited.pdf');a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast(`Saved ${eds.length} edit${eds.length!==1?'s':''}`,'ok');
  }catch(e){console.error(e);toast('Error: '+e.message,'err')}
  load(false);
}

// ─────────────────────────────────────────────
// Zoom & Reset
// ─────────────────────────────────────────────
async function setZoom(z){
  D.zoom=Math.max(.5,Math.min(2.5,z));$('zval').textContent=Math.round(D.zoom*100)+'%';
  if(D.pdf){load(true);const sv={...D.edits};D.pages={};await render();
    for(const k in sv){const e=sv[k];const pd=D.pages[e.p];if(pd){const m=pd.blocks.find(x=>x.text===e.b.text);if(m){D.edits[`${e.p}_${m.id}`]={p:e.p,b:m,nw:e.nw};preview(e.p,m,e.nw);pd.bl.querySelector(`[data-id="${m.id}"]`)?.classList.add('edited')}}}
    updUI();load(false);
  }
}

function reset(){if(!Object.keys(D.edits).length)return;D.edits={};D.undo=[];D.redo=[];for(const pd of Object.values(D.pages)){pd.ov.getContext('2d').clearRect(0,0,pd.W,pd.H);pd.bl.querySelectorAll('.txt-blk').forEach(d=>d.classList.remove('edited','active'))}updUI();toast('Reset')}
function openNew(){D.edits={};D.pdf=null;D.bytes=null;D.pages={};$('pages').innerHTML='';$('app').classList.remove('show');$('upload').style.display='flex'}

// ─────────────────────────────────────────────
// Events
// ─────────────────────────────────────────────
$('filein').onchange=e=>e.target.files[0]&&openPDF(e.target.files[0]);
const dz=$('dropzone');
dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='#3b82f6'};
dz.ondragleave=()=>dz.style.borderColor='';
dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';e.dataTransfer.files[0]&&openPDF(e.dataTransfer.files[0])};
document.ondragover=e=>e.preventDefault();
document.ondrop=e=>{e.preventDefault();e.dataTransfer.files[0]&&openPDF(e.dataTransfer.files[0])};
$('undo').onclick=undo;$('redo').onclick=redo;
$('zout').onclick=()=>setZoom(D.zoom-.25);$('zin').onclick=()=>setZoom(D.zoom+.25);
$('reset').onclick=reset;$('open').onclick=openNew;$('save').onclick=savePDF;
$('viewer').onclick=e=>{if(!e.target.classList.contains('txt-blk')&&!e.target.classList.contains('txt-edit'))commit()};
document.onkeydown=e=>{
  if(D.curr)return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo()}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo()}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();savePDF()}
  if((e.ctrlKey||e.metaKey)&&e.key==='='){e.preventDefault();setZoom(D.zoom+.25)}
  if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();setZoom(D.zoom-.25)}
};
</script>
</body>
